name: CD - Entrega Continua

on:
  push:
    tags:
      - 'v*'

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_HUB_USERNAME }}/meu-pipeline

jobs:
  release:
    name: Release Versionada
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Extract version from tag
        id: meta
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build and push with version tag
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ steps.meta.outputs.version }}
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            Release ${{ github.ref_name }}

            Docker Images:
            - ${{ env.DOCKER_IMAGE }}:${{ steps.meta.outputs.version }}
            - ${{ env.DOCKER_IMAGE }}:latest

            Commit SHA: ${{ github.sha }}
          draft: false
          prerelease: false

      - name: Show release info
        run: |
          echo "Release ${{ steps.meta.outputs.version }} criada!"